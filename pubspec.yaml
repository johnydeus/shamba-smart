name: shamba_smart
description: "Shamba Smart - AI Crop Disease Detection for Tanzanian Farmers"
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase - database, auth, storage
  supabase_flutter: ^2.3.0

  # HTTP - for Claude API calls
  http: ^1.1.0

  # Environment variables - keeps API keys safe
  flutter_dotenv: ^5.1.0

  # Camera - take leaf photos + live stream
  image_picker: ^1.0.4
  camera: ^0.10.5+9

  # Location / GPS
  geolocator: ^10.1.0
  permission_handler: ^11.0.0

  # Offline storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2

  # UI extras
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9

  # State management
  provider: ^6.1.2

  # Google Fonts
  google_fonts: ^6.1.0

  # UI polish
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  page_transition: ^2.1.0
  curved_navigation_bar: ^1.0.3

  # Date formatting
  intl: ^0.19.0

  # Satellite / Map feature
  flutter_map: ^6.1.0          # OpenStreetMap map widget
  latlong2: ^0.9.1             # LatLng coordinate model
  fl_chart: ^0.68.0            # NDVI timeline chart

  # Multimedia messaging
  file_picker: ^8.1.2          # Pick PDF / TXT files
  open_filex: ^4.4.1           # Open files on device
  url_launcher: ^6.3.0         # Open maps for location sharing

  # Offline detection + file system
  connectivity_plus: ^5.0.2
  path: ^1.9.0
  path_provider: ^2.1.1
  uuid: ^4.5.1

  # Mkulima AI — on-device TFLite inference
  tflite_flutter: ^0.12.0
  image: ^4.1.3

  # Audio TTS for Swahili voice responses
  flutter_tts: ^3.8.5

  # PDF generation for farm reports
  pdf: ^3.10.8
  printing: ^5.12.0

  # Share functionality
  share_plus: ^7.2.2

  # Calendar for spray/fertiliser schedule
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/data/diseases.json
    - assets/data/pesticides.json
    - assets/data/tosci_seed_varieties.json
    - assets/mkulima_v2_best.tflite
    - assets/class_names_v2.json
    - assets/mkulima_diseases_sw.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_final.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A5C2E"
  adaptive_icon_foreground: "assets/icon/app_icon_final.png"
  remove_alpha_ios: true